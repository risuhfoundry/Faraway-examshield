services:
  - type: web
    name: examshield-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: EXAMSHIELD_AI_HOST
        value: 0.0.0.0
      - key: EXAMSHIELD_AI_CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: EXAMSHIELD_PUBLIC_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: EXAMSHIELD_OCR_CHAIN
        value: paddle,tesseract
      - key: EXAMSHIELD_OCR_TIMEOUT
        value: "45"
      - key: EXAMSHIELD_OCR_TOTAL_BUDGET_SECONDS
        value: "120"
      - key: EXAMSHIELD_OCR_MAX_DIMENSION
        value: "1920"
      - key: EXAMSHIELD_PADDLE_TIMEOUT_SECONDS
        value: "60"
      - key: EXAMSHIELD_PADDLE_INIT_TIMEOUT_SECONDS
        value: "300"
      - key: EXAMSHIELD_PADDLE_DET_MODEL
        value: PP-OCRv5_mobile_det
      - key: EXAMSHIELD_PADDLE_REC_MODEL
        value: PP-OCRv5_mobile_rec
      - key: EXAMSHIELD_PADDLE_WARMUP
        value: "1"
      - key: EXAMSHIELD_PADDLE_LANG
        value: en
      - key: EXAMSHIELD_OCR_MAX_RETRIES
        value: "0"
      - key: EXAMSHIELD_OCR_FAST
        value: "1"
      - key: EXAMSHIELD_OCR_WORKERS
        value: "1"
      - key: EXAMSHIELD_OCR_MODE
        value: sequential
      - key: EXAMSHIELD_OCR_PSMS
        value: "6,4"
      - key: EXAMSHIELD_OCR_PSM_WORKERS
        value: "2"
      - key: EXAMSHIELD_ANALYSIS_JOB_TIMEOUT_SECONDS
        value: "180"
      - key: EXAMSHIELD_STALE_JOB_SWEEP_SECONDS
        value: "60"
      - key: EXAMSHIELD_STALE_JOB_MAX_AGE_SECONDS
        value: "180"
      - key: EXAMSHIELD_AI_PLANNER_MODEL
        value: mistralai/ministral-14b-instruct-2512
      - key: EXAMSHIELD_AI_MODEL
        value: meta/llama-4-maverick-17b-128e-instruct
      - key: EXAMSHIELD_TOOL_PLANNER_TIMEOUT_SECONDS
        value: "4"
      - key: EXAMSHIELD_AI_STREAM_TIMEOUT_SECONDS
        value: "45"
      - key: EXAMSHIELD_LIST_CACHE_TTL_SECONDS
        value: "8"
      - key: EXAMSHIELD_AI_CHAT_MAX_TOKENS
        value: "220"
      - key: EXAMSHIELD_AI_PLANNER_MAX_TOKENS
        value: "120"
